services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    network_mode: host
    volumes:
      - .:/app
    depends_on:
      - ollama
    command:
      - uvicorn
      - src.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_HOST: 0.0.0.0
      VITE_API_PROXY_TARGET: http://host.docker.internal:8001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: where-do-i-start-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  frontend_node_modules:
  ollama_data:
